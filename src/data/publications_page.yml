# Content for /publications/ — summary, keyword tag cloud, and topic groupings.
# Each topic carries a `tag` matching the canonical lowercase-hyphen topic on
# publications (see the `topics:` field in publications.yml). Clicking a card
# on the page filters the list to that tag. `example_count` is the size of
# that intersection.

summary: >
  A working list of papers and preprints from the Senseable Intelligence
  Group at the MIT McGovern Institute, compiled from group CVs, NCBI
  MyBibliography, and OpenAlex. Entries are organised by year, publication
  type, and topic and link out to the canonical record (DOI, PubMed, arXiv)
  and, where available, open-access PDFs. The list is filterable by year,
  type, topic, and lab author.

keywords:
  - brain
  - neuroimaging
  - fmri
  - connectivity
  - functional
  - imaging
  - network
  - speech
  - voice
  - auditory
  - anxiety
  - depression
  - mental-health
  - adolescent
  - autism
  - reproducible
  - nipype
  - dandi
  - open-data
  - segmentation

topics:
  - label: Neuroimaging and brain dynamics
    tag: neuroimaging
    description: Methods, atlases, and population studies of human brain structure and function.
    example_count: 85
  - label: Brain states and naturalistic dynamics
    tag: brain-dynamics
    description: Latent brain states, real-time neurofeedback, and responses to naturalistic stimuli.
    example_count: 3
  - label: Reproducibility and open infrastructure
    tag: reproducibility
    description: Workflows, standards, and archives for reproducible, FAIR neuroscience (Nipype, Pydra, DANDI, ReproNim).
    example_count: 35
  - label: Speech and voice biomarkers
    tag: speech-biomarkers
    description: Using voice, speech, and acoustic features to detect and track health conditions.
    example_count: 31
  - label: Mental health and psychiatry
    tag: mental-health
    description: Symptom dimensions, clinical populations, and digital signals for psychiatric conditions.
    example_count: 25
  - label: Child development and learning
    tag: child-development
    description: Adolescent brain studies (ABCD), autism, literacy, and pediatric speech.
    example_count: 22
  - label: Knowledge graphs and agentic extraction
    tag: knowledge-graphs
    description: Ontologies, schemas, and LLM-agent pipelines for structured biomedical knowledge.
    example_count: 8
  - label: Machine learning and predictive models
    tag: machine-learning
    description: Deep learning, classification, and predictive modelling across neuro and behavioural data.
    example_count: 15
