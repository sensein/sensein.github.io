- slug: brain-states
  title: Brain States
  status: active
  description: >
    A brain state is a latent (hidden) variable representing a recurring
    whole-brain configuration of neural activity — characterized by
    emissions (spatial patterns), transition probabilities, and dwell
    time. Research questions: Is there systematic structure in how brain
    configurations relate to the world and behavior? How does this
    structure differ between the neurodivergent and neurotypical
    populations?
  themes: [neuroimaging, brain-dynamics]
  links: []
  contributors:
    current: [Yibei Chen]
    former: []

