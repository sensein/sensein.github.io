- slug: covid-reddit-mental-health
  title: COVID-19 mental-health concerns on Reddit
  status: former
  description: >
    Analyzed 800 000+ posts from 2018–2021 to track semantic-content
    changes across 15 mental-health support communities, surfacing
    vulnerable groups and a doubling of posts within suicidality and
    loneliness clusters. Released a Mental Health Reddit Dataset.
  image: /images/projects/covid-reddit-mental-health.webp
  themes:
  - mental-health-psychiatry
  - ml-nlp-knowledge
  links:
  - {label: JMIR paper, url: "https://www.jmir.org/2020/10/e22635"}
  - {label: MIT News, url: "https://news.mit.edu/2020/covid-19-impact-mental-health-1105"}
  - {label: WEF coverage, url: "https://www.weforum.org/stories/2020/11/machine-learning-track-pandemic-impact-mental-health/"}
  - {label: Zenodo dataset, url: "https://zenodo.org/record/3941387"}
  - {label: OSF supplement, url: "https://osf.io/2bfpn/"}
  - {label: GitHub, url: "https://github.com/danielmlow/reddit"}
  contributors:
    current: []
    former: [Daniel M. Low, Satrajit S Ghosh]
  publications:
  - 10.2196/22635
  # External: Laurie Rumker, Tanya Talkar, John Torous, Guillermo Cecchi.

