# Senseable Intelligence Group projects.
#
# Each entry has:
#   - slug:         URL-safe id (also used by the detail page when one exists)
#   - title:        human-readable name
#   - status:       "active" or "former"
#   - description:  one-paragraph summary (the *what* and *why*, briefly)
#   - funder:       optional grant / award identifier (with role + co-PIs)
#   - image:        optional path under public/
#   - themes:       optional list of tags for filtering
#   - links:        optional [{ label, url }, ...]
#   - contributors: { current: [name, ...], former: [name, ...] }
#                   Both lists are alphabetized by display name.
#   - publications: optional [DOI | arXiv id, ...]  cross-references into
#                   src/data/publications.yml. The canonical corpus lives
#                   there; this list is the per-project anchor set.
#
# Contributor names should match an entry in team_members.yml /
# students.yml / alumni_members.yml so they render as links to
# /team/#<slug>. External / consortium collaborators render as plain text.
#
# Iteration: open a PR editing this file. PROJECTS.md has conventions.
# Lines tagged with "# TODO" need follow-up from someone with the facts.

