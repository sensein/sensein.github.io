- slug: sails
  title: 'SAILS — Speech & Action In-home Learning System'
  status: active
  description: >
    Into the Wild — automated quantification of autism-relevant
    behaviors from naturalistic home videos. The study pipeline runs
    end-to-end: parents are reached through SPARK Research Match,
    submit questionnaires and home-video uploads, and complete a
    remote language assessment; videos pass automated metadata checks
    and human quality review; trained annotators produce ground-truth
    labels against a shared manual with ICC reliability checks; and
    VLM-based models score uniform frame samples for video-level
    behavior predictions. Brings together three theses: Manaal
    Mohammed's on target-child behavior detection (vocalizations via
    USC-SAIL / Whisper baseline; locomotion via S3D gated 3D CNN),
    Lucie Bierent's on socialization-behavior recognition (response to
    name, non-verbal communication, gesture prediction), and Bruke
    Wossenseged's thesis work.
  funder: Simons Foundation (Site PI, 2025–2026); Kennedy Krieger Institute partnership
  image: /images/projects/sails-pipeline.svg
  themes: [child-development-education, mental-health-psychiatry, ml-nlp-knowledge, speech-voice-biomarkers]
  links:
  - {label: sailsprep on GitHub, url: https://github.com/sensein/sailsprep}
  - {label: ASD AI scoping review, url: https://github.com/sensein/asd-ai-scoping-review}
  contributors:
    current: [Satrajit S Ghosh, Yibei Chen, Manaal Mohammed, Aparna BG]
    former: [Bruke Wossenseged, Lucie Bierent, Fabio Catania]
    external:
    - Rachel Reetzke (Kennedy Krieger)
    - Rebecca Landa (Kennedy Krieger)
    - Elizabeth Eiler (Kennedy Krieger)
    - Arushi Singh (Kennedy Krieger)
    - Jeremy Perrin (Kennedy Krieger)
    - Vini Singh (Kennedy Krieger)
  publications: []

- slug: brain-states
  title: Brain States
  status: active
  description: >
    A brain state is a latent (hidden) variable representing a recurring
    whole-brain configuration of neural activity — characterized by
    emissions (spatial patterns), transition probabilities, and dwell
    time. Research questions: Is there systematic structure in how brain
    configurations relate to the world and behavior? How does this
    structure differ between the neurodivergent and neurotypical
    populations?
  image: /images/projects/brain-states.webp
  themes:
  - brain-dynamics-naturalistic
  - neuroimaging-methods
  links:
