- slug: bbqs
  title: BBQS — Brain Behavior Quantification and Synchronization
  status: active
  description: >
    A BRAIN-Initiative consortium developing tools to capture and quantify
    behavior at high temporal resolution and across multiple dimensions, to
    synchronize behavior with simultaneously-recorded brain activity, and to
    build conceptual and computational models of behavior. Includes a
    cross-disciplinary consortium for tools, research designs, and ethics.
  funder: NIDA U24 DA064429
  image: /images/external/bbqs-logo.png
  themes: [behavioral-quantification, consortium, open-data]
  links:
    - { label: Project website, url: https://brain-bbqs.org }
    - { label: BBQS on GitHub, url: https://github.com/brain-bbqs }
  contributors:
    current: [Satrajit S Ghosh, Nader Nikbakht]
    former: []

