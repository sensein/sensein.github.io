- slug: bridge2ai-voice
  title: Bridge2AI Voice
  status: active
  description: >
    Build an ethically-sourced, diverse, AI-ready database of 10,000 human
    voices linked to health information across five disease categories:
    cardio-respiratory, mood, pediatric speech, voice, and neurological
    disorders. Develops standards for acoustic research data, technical
    infrastructure for collection/storage/sharing, ethical guidelines, and
    educational dissemination.
  themes: [speech-biomarkers, open-data, ai-ready]
  links: [] # TODO add Bridge2AI public URL
  contributors:
    current: [Satrajit S Ghosh, Rahul Brito, Kaley Jenney, Jordan Wilke]
    former: [Fabio Catania, Daniel M. Low]

- slug: senselab
  title: senselab
  status: active
  description: >
    Research software toolkit for voice/speech/behavioral analysis and
