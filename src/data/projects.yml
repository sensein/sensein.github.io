- slug: readnet
  title: ReadNet — ML for verbal literacy screening
  status: active
  description: >
    Manual scoring of verbal literacy screeners takes time away from
    instruction and can be unreliable. ReadNet is an ML approach to help
    teachers quickly and reliably identify children needing early-literacy
    intervention.
  themes: [child-development, education, machine-learning]
  links: []
  contributors:
    current: [Meral Hacikamiloglu]
    former: []

- slug: dandi-reuse
  title: DANDI-reuse — Neurophysiology data papers + AI Scientist
  status: active
  description: >
    Multiple papers in preparation reusing DANDI data — spatially-masked
    regression for electrophysiology, neuronal constraints in RNNs,
    scaling laws for cortical inhibition, hippocampal/lateral-septum
    dynamics, state-dependent complexity, cortical traveling waves,
    Bayesian inference of cortical assembly formation — plus an
    "AI Scientist" loop (metadata ingestion → hypothesis refinement →
    in-silico experiment design → analysis → repeat).
  themes: [neurophysiology, machine-learning, automation]
  links: []
  contributors:
    current: [Nima Dehghani]
    former: []

- slug: structsense
  title: StructSense — Agentic structured information extraction
  status: active
  description: >
    A task-agnostic multi-agent system for structured information
    extraction. Used by BrainKB to extract causal mechanisms (not just
    entities) from neuroscience literature, with a prototype tool that
    converts flat NER data into valid, Marr-aligned JSON-LD.
  themes: [knowledge-graphs, agents, llm]
  links:
    - { label: Preprint (arXiv 2507.03674), url: https://arxiv.org/abs/2507.03674 }
  contributors:
    current: [Tek Raj Chhetri, Puja Trivedi, Nader Nikbakht]
    former: []

