    reproducible pipelines and utilities.
  themes: [software, speech-biomarkers, reproducibility]
  links: [] # TODO add senselab GitHub URL
  contributors:
    current: [Jordan Wilke]
    former: [Fabio Catania]

- slug: riverst-kiva
  title: Riverst / KIVA — Digital tutor for childhood literacy
  status: active
  description: >
    Riverst is a digital-tutor platform for childhood literacy; KIVA is an
    instance focused on vocabulary learning. The platform integrates with
    senselab to extract speech features. Research questions: Can an avatar
    understand child speech? Can LLMs adapt to each child? Can an LLM
    effectively teach vocabulary?
  themes: [child-development, llm, speech]
  links: [] # TODO add Riverst / KIVA project URLs
