- slug: repronim
  title: ReproNim — Center for Reproducible Neuroimaging Computation
  status: active
  description: >
    A Center dedicated to improving reproducibility in neuroimaging via
    best practices, tools, and training. Current efforts include Simple 2
    (re-executable neuroimaging publications with NIDM provenance),
    ReproSchema (standardized questionnaires/assessments for ABCD, HBCD,
    Bridge2AI), ReproBRAISE / ABCD-ReproNim (Reproducible BRAIn State
    Extraction), containerized BIDS apps (FreeSurfer/FSL/ANTs/MRIQC), and
    BABS (BIDS App Bootstrap).
  funder: NIBIB P41 EB019936
  themes: [reproducibility, neuroimaging, software, training]
  links:
    - { label: Project website, url: https://repronim.org }
    - { label: ReproNim on GitHub, url: https://github.com/repronim }
  contributors:
    current: [Satrajit S Ghosh, Dorota Jarecka, Yibei Chen]
    former: []
  # PI: David Kennedy (UMass Medical School).

- slug: nipype-pydra
  title: Nipype / Pydra
  status: active
  description: >
    Nipype is a community-developed Python project providing a uniform
    interface to existing neuroimaging software (ANTS, SPM, FSL,
    FreeSurfer, Camino, MRtrix, MNE, AFNI, Slicer) and underpinning many
    popular pipelines including fmriprep. Pydra is a lightweight Python
    dataflow engine designed to succeed Nipype: reproducible, scalable
    workflows that link shell commands and Python functions.
  themes: [software, neuroimaging, reproducibility, workflows]
  links:
    - { label: Nipype, url: https://nipype.readthedocs.io/ }
    - { label: Pydra, url: https://pydra.readthedocs.io/ }
  contributors:
    current: [Satrajit S Ghosh, Dorota Jarecka]
    former: []

