- slug: vocal-fold-paralysis
  title: Detecting vocal-fold paralysis from voice
  status: former
  description: >
    Analyzed sustained vowel and read speech to detect unilateral
    vocal-fold paralysis; explored biases in recording and compared ML
    performance to clinicians' diagnosis-from-voice ability.
  image: /images/projects/vocal-fold-paralysis.webp
  themes:
  - speech-voice-biomarkers
  - mental-health-psychiatry
  links:
  - {label: "PLOS Digital Health paper (PMID 38814935)", url: "https://journals.plos.org/digitalhealth/article?id=10.1371/journal.pdig.0000516"}
  - {label: medRxiv preprint, url: "https://www.medrxiv.org/content/10.1101/2020.11.23.20235945v8"}
  contributors:
    current: []
    former: [Daniel M. Low, Satrajit S Ghosh]
  publications:
