- slug: linc
  title: LINC / CONNECTS — Large-scale Imaging of Neural Circuits
  status: active
  description: >
    A multi-site effort combining macaque and human dMRI (660 mT/m and
    500 mT/m), light-sheet microscopy with tracers, polarization-sensitive
    OCT, HiP-CT, and micro-CT into integrated pipelines for clearing,
    imaging, storage, and dissemination of neural-circuit data. Use cases
    include DBS-circuit mapping and biophysical modeling.
  funder: UM1 NS132358
  themes: [connectomics, imaging, consortium]
  links:
    - { label: CONNECTS project site, url: https://connects.mgh.harvard.edu/ }
    - { label: LINC Brain gallery, url: https://gallery.lincbrain.org }
  contributors:
    current: [Satrajit S Ghosh, Kabilar Gunalan] # site PI = Satra; full PI list below
    former: []
