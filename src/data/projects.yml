  status: former
  description: >
    Open Python library to simplify integrating deep learning into
    neuroimaging research, distributing user-friendly cloud-enabled
    end-user applications for the community. The Nobrainer / KWYK
    framework underlies several brain-segmentation and meningioma-detection
    studies.
  funder: NIMH RF1 MH121885 (PI, 2020–2024)
  image: /images/external/unet-best-prediction-8b27578e.webp
  themes:
  - reproducibility-tooling
  - neuroimaging-methods
  - ml-nlp-knowledge
  links:
  - {label: Nobrainer on GitHub, url: https://github.com/neuronets/nobrainer}
  - {label: Trained model zoo, url: https://github.com/neuronets/nobrainer-zoo}
  - {label: Pretrained models, url: https://github.com/neuronets/trained-models}
  - {label: Neuronets on GitHub, url: https://github.com/neuronets}
  contributors:
    current: []
    former: [Aakanksha Rana, Jakub Kaczmarzyk, Satrajit S Ghosh]
  publications:
  - 10.3389/fninf.2019.00067       # McClure et al. 2019 KWYK
  - 10.1038/s41598-022-19026-6     # Boaro et al. 2022 meningioma

- slug: mumble-melody
  title: "Mumble Melody — Musically-modulated auditory feedback for people who stutter"
  status: former
  description: >
    Mobile app and one-month clinical study using altered auditory feedback
    (AAF) — pitch shifts, delays, reverberation, whisper, harmony — to
    increase fluency for people who stutter. US Patent 11,727,949 B2 issued
    Aug 2023 for the underlying technique.
  funder: McGovern Institute NTP + MIT Deshpande Center (PI; co-PI Machover)
  image: /images/Mumble_Melody_logo.webp
  themes:
  - speech-voice-biomarkers
  - mental-health-psychiatry
  links:
  - {label: Project page, url: /mumble_melody_project}
  - {label: Study page, url: /mumble_melody_study}
  - {label: MIT Media Lab project, url: https://www.media.mit.edu/projects/mumble-melody/overview/}
  - {label: Mumble Melody on the App Store, url: "https://apps.apple.com/us/app/mumble-melody/id1607934697"}
  - {label: "US Patent 11,727,949 B2", url: "https://patents.google.com/patent/US11727949B2/en"}
  - {label: MumbleMelody-Long study repo, url: https://github.com/sensein/MumbleMelody_Long}
  - {label: Stuttering survey repo, url: https://github.com/sensein/Stuttering_survey}
  contributors:
    current: []
    former: [Akito van Troyer, Alisha Kodibagkar, George Stefanakis, Megha Vemuri, Mike Erkkinen, Rebecca Kleinberger, Satrajit S Ghosh, Tod Machover]
  publications: []

- slug: naturalistic-parcellation
  title: Naturalistic Parcellation and audiovisual integration
  status: former
  description: >
    A Neuroscout project generating cortical parcellations from
    naturalistic (movie-viewing) neuroimaging datasets, with goals
    including character-ID decoding, audiovisual-feature mapping,
    auditory-specific and whole-brain parcellations, and reproducibility
    across datasets.
  funder: NIMH R01 MH109682 (Site PI; PI Yarkoni)
  image: /images/brain_parcellation.webp
  themes:
  - brain-dynamics-naturalistic
  - neuroimaging-methods
  links:
  - {label: Project page, url: /naturalistic_parcellation}
  - {label: "Neuroscout paper (eLife 2022)", url: "https://elifesciences.org/articles/79277"}
  contributors:
    current: []
    former: [Christopher J Markiewicz, Jeff Mentch, Satrajit S Ghosh]
  publications:
  - 10.7554/eLife.79277     # de la Vega et al. 2022 Neuroscout
  # External: Neuroscout Team, Peer Herholz.

