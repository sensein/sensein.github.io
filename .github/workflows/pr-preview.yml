name: Deploy PR preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: pr-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      deployments: write
    env:
      ASTRO_BASE: /pr-preview/pr-${{ github.event.number }}
      PREVIEW_URL: https://sensein.group/pr-preview/pr-${{ github.event.number }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build site
        if: github.event.action != 'closed'
        run: npm run build

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto

      - name: Add 'Preview' check with link
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Preview',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: 'success',
              details_url: url,
              output: {
                title: 'Preview deployed',
                summary: `[View preview](${url})\n\nUpdates on every push to this PR. Removed automatically when the PR closes.`,
              },
            });
