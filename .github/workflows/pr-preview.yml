name: Deploy PR preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: pr-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      deployments: write
    env:
      ASTRO_BASE: /pr-preview/pr-${{ github.event.number }}
      PREVIEW_URL: https://sensein.group/pr-preview/pr-${{ github.event.number }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build site
        if: github.event.action != 'closed'
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: npm run build

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto

      - name: Create deployment + status (preview)
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            const environment = `pr-preview-${context.payload.pull_request.number}`;
            const dep = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment,
              transient_environment: true,
              production_environment: false,
              auto_merge: false,
              required_contexts: [],
              description: `Preview for PR #${context.payload.pull_request.number}`,
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: dep.data.id,
              state: 'success',
              environment_url: previewUrl,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Preview deployed',
            });
            // Also a check for the Checks tab.
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Preview',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: 'success',
              details_url: previewUrl,
              output: {
                title: 'Preview deployed',
                summary: `[View preview](${previewUrl})\n\nUpdates on every push to this PR. Removed automatically when the PR closes.`,
              },
            });

      - name: Mark preview deployment inactive (on PR close)
        if: github.event.action == 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const environment = `pr-preview-${context.payload.pull_request.number}`;
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment,
              per_page: 100,
            });
            for (const dep of deployments) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: dep.id,
                state: 'inactive',
                description: 'PR closed; preview removed',
              });
            }
