<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="t">
  <title id="t">Publications</title>
  <style>
    .bg { fill: none; }
    .frame { fill: none; stroke: currentColor; stroke-width: 2; opacity: 0.25; }
    .card { fill: none; stroke: currentColor; stroke-width: 1.5; opacity: 0.55; }
    .bar { fill: currentColor; opacity: 0.65; }
    .line { fill: none; stroke: currentColor; stroke-width: 1; opacity: 0.35; }
    .edge { fill: none; stroke: currentColor; stroke-width: 1; opacity: 0.4; }
    .node { fill: currentColor; opacity: 0.7; }
    .nodeBig { fill: currentColor; opacity: 0.85; }
    .title { fill: currentColor; font: 600 64px/1.1 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .sub { fill: currentColor; font: 400 26px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; opacity: 0.65; }
    .slug { fill: currentColor; font: 500 20px/1.0 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; opacity: 0.5; letter-spacing: 0.04em; }
  </style>
  <rect class="bg" width="1200" height="630"/>
  <rect class="frame" x="40" y="40" width="1120" height="550" rx="16"/>

  <!-- Stack of paper-like cards on the left -->
  <g transform="translate(110 130)">
    <rect class="card" x="40" y="40" width="280" height="340" rx="8"/>
    <rect class="card" x="20" y="20" width="280" height="340" rx="8"/>
    <rect class="card" x="0"  y="0"  width="280" height="340" rx="8"/>
    <!-- title bar -->
    <rect class="bar" x="20" y="24" width="180" height="10" rx="2"/>
    <!-- text lines -->
    <rect class="line" x="20" y="56" width="240" height="2"/>
    <rect class="line" x="20" y="74" width="240" height="2"/>
    <rect class="line" x="20" y="92" width="200" height="2"/>
    <rect class="line" x="20" y="120" width="240" height="2"/>
    <rect class="line" x="20" y="138" width="220" height="2"/>
    <rect class="line" x="20" y="156" width="240" height="2"/>
    <rect class="line" x="20" y="174" width="160" height="2"/>
    <rect class="line" x="20" y="202" width="240" height="2"/>
    <rect class="line" x="20" y="220" width="200" height="2"/>
    <rect class="line" x="20" y="238" width="240" height="2"/>
    <rect class="line" x="20" y="256" width="180" height="2"/>
    <rect class="line" x="20" y="284" width="240" height="2"/>
    <rect class="line" x="20" y="302" width="220" height="2"/>
  </g>

  <!-- Citation-network mini-graph on the right -->
  <g transform="translate(620 130)">
    <!-- edges -->
    <line class="edge" x1="120" y1="60"  x2="260" y2="120"/>
    <line class="edge" x1="120" y1="60"  x2="60"  y2="180"/>
    <line class="edge" x1="260" y1="120" x2="220" y2="240"/>
    <line class="edge" x1="260" y1="120" x2="380" y2="180"/>
    <line class="edge" x1="60"  y1="180" x2="160" y2="260"/>
    <line class="edge" x1="60"  y1="180" x2="220" y2="240"/>
    <line class="edge" x1="220" y1="240" x2="160" y2="260"/>
    <line class="edge" x1="220" y1="240" x2="380" y2="180"/>
    <line class="edge" x1="380" y1="180" x2="420" y2="300"/>
    <line class="edge" x1="160" y1="260" x2="80"  y2="320"/>
    <line class="edge" x1="220" y1="240" x2="420" y2="300"/>
    <line class="edge" x1="160" y1="260" x2="280" y2="330"/>
    <line class="edge" x1="280" y1="330" x2="420" y2="300"/>
    <line class="edge" x1="80"  y1="320" x2="280" y2="330"/>
    <!-- nodes -->
    <circle class="nodeBig" cx="220" cy="240" r="10"/>
    <circle class="nodeBig" cx="260" cy="120" r="8"/>
    <circle class="node" cx="120" cy="60"  r="6"/>
    <circle class="node" cx="60"  cy="180" r="6"/>
    <circle class="node" cx="380" cy="180" r="7"/>
    <circle class="node" cx="160" cy="260" r="6"/>
    <circle class="node" cx="80"  cy="320" r="5"/>
    <circle class="node" cx="280" cy="330" r="6"/>
    <circle class="node" cx="420" cy="300" r="7"/>
  </g>

  <text class="title" x="600" y="495" text-anchor="middle">Publications</text>
  <text class="sub" x="600" y="535" text-anchor="middle">Papers and preprints from the Senseable Intelligence Group</text>
  <text class="slug" x="600" y="572" text-anchor="middle">publications</text>
</svg>
